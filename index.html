<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Apple Pay Checkout</title>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ffffff;
        }
        .instruction {
            font-size: 18px;
            font-weight: 500;
            color: #333333;
            margin-bottom: 30px;
        }
        
        /* REQUIRED BY APPLE: Renders the Shadow DOM button */
        apple-pay-button {
            --webkit-appearance: -apple-pay-button;
            --apple-pay-button-width: 250px;
            --apple-pay-button-height: 45px;
            --apple-pay-button-border-radius: 6px;
            display: inline-block;
        }
        
        /* Hide the PayFields standard inputs and button */
        .hidden-fields { display: none; }
    </style>
    
    <script src="https://api.payrix.com/payFieldsScript"></script>
</head>
<body>
    <div class="instruction">Tap below to complete payment</div>
    
    <script crossorigin src="https://applepay.cdn-apple.com/jsapi/1.latest/apple-pay-sdk.js"></script>

    <apple-pay-button buttonstyle="black" type="plain" locale="en"></apple-pay-button>
    
    <div class="hidden-fields">
        <div id="number"></div>
        <div id="expiration"></div>
        <div id="cvv"></div>
        <button type="button" id="submit" name="Submit"></button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const sessionKey = urlParams.get('session');
        const amountInCents = urlParams.get('amount');

        if (sessionKey && amountInCents) {
            
            // Config
            PayFields.config.txnSessionKey = sessionKey;
            PayFields.config.merchant = "p1_mer_65f480fcb8309191c7819c8"; 
            PayFields.config.amount = amountInCents;
            PayFields.config.mode = 'txnToken';
            
            // Enable Apple Pay using the object syntax
            PayFields.config.applePay = { enabled: true };

            // REQUIRED: Map the fields so the PayFields engine actually initializes
            PayFields.fields = [
                { type: 'number', element: '#number' },
                { type: 'cvv', element: '#cvv' },
                { type: 'expiration', element: '#expiration' }
            ];

            // REQUIRED: Map the hidden submit button
            PayFields.button = { element: "#submit" };

            // Callbacks
            PayFields.onSuccess = function(response) {
                if (window.webkit && window.webkit.messageHandlers.applePayHandler) {
                    window.webkit.messageHandlers.applePayHandler.postMessage({
                        status: 'success', 
                        data: response
                    });
                }
            };

            PayFields.onFailure = function(errors) {
                if (window.webkit && window.webkit.messageHandlers.applePayHandler) {
                    window.webkit.messageHandlers.applePayHandler.postMessage({
                        status: 'error', 
                        error: 'Payment failed or was cancelled.',
                        details: errors
                    });
                }
            };
        } else {
            document.querySelector('.instruction').innerText = "Session configuration missing.";
        }
    </script>
</body>
</html>
