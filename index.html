<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Limosys Apple Pay Bridge</title>

  <style>
    body {
      display: flex; 
      justify-content: center; 
      align-items: center;
      height: 100vh; 
      margin: 0; 
      background-color: transparent; 
      -webkit-user-select: none; 
      user-select: none;
    }
    
    apple-pay-button {
      -webkit-appearance: -apple-pay-button;
      -apple-pay-button-width: 250px;
      -apple-pay-button-height: 45px;
      -apple-pay-button-border-radius: 6px;
      display: none;
    }
  </style>

  <script crossorigin src="https://applepay.cdn-apple.com/jsapi/1.latest/apple-pay-sdk.js"></script>
</head>
<body>
  
  <apple-pay-button id="applePayButton" buttonstyle="black" type="plain" locale="en"></apple-pay-button>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const amountInCents = urlParams.get("amount");
    const jobId = urlParams.get("jobId");
    const deviceId = urlParams.get("deviceId");
    const custId = urlParams.get("custId");

    const applePayButton = document.getElementById("applePayButton");
    const merchantValidationUrl = "https://limosystest.pl.tripslink.com/JlimoWSJson/jlimowsjson"; 

    function postToIOS(payload) {
      if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.applePayHandler) {
        window.webkit.messageHandlers.applePayHandler.postMessage(payload);
      }
    }

    // Direct JS Fetch for Merchant Validation
    async function postJson(url, body) {
      const response = await fetch(url, {
        method: "POST",
        credentials: "include",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(body)
      });

      const data = await response.json().catch(() => null);
      if (!response.ok) {
        throw new Error(data?.message || "Request failed");
      }
      return data;
    }

    async function startApplePay() {
      try {
        const amountDecimal = (Number(amountInCents) / 100).toFixed(2);
        const request = {
          countryCode: "US",
          currencyCode: "USD",
          supportedNetworks: ["visa", "masterCard", "amex", "discover"],
          merchantCapabilities: ["supports3DS"],
          requiredBillingContactFields: ["postalAddress", "name"],
          total: { label: "Trip Payment", amount: amountDecimal }
        };

        const session = new ApplePaySession(3, request);

        // 1. Merchant Validation - HTML makes the call directly
        session.onvalidatemerchant = async function (event) {
          try {
            const merchantSessionResponse = await postJson(merchantValidationUrl, {
              client: "ios",
              calls: [
                {
                  method: "CreateApplePaySession",
                  params: JSON.stringify({
                    jobId: jobId ? Number(jobId) : 0,
                    deviceId: deviceId || "",
                    custId: custId ? Number(custId) : 0,
                    body: {
                      validationDomain: window.location.hostname
                    }
                  })
                }
              ]
            });

            // Pass the session back to Apple
            const sessionData = merchantSessionResponse.data || merchantSessionResponse;
            session.completeMerchantValidation(sessionData);

          } catch (error) {
            session.abort();
            postToIOS({
              status: "error",
              error: "Merchant validation failed (Network/CORS).",
              details: error.message
            });
          }
        };

        // 2. Payment Authorized
        session.onpaymentauthorized = function (event) {
          try {
            const payment = event.payment;
            postToIOS({
              status: "success",
              data: {
                amountInCents: Number(amountInCents),
                billingContact: payment.billingContact || {},
                token: payment.token || {}
              }
            });
            session.completePayment(ApplePaySession.STATUS_SUCCESS);
          } catch (error) {
            session.completePayment(ApplePaySession.STATUS_FAILURE);
            postToIOS({ status: "error", error: "Authorization failed." });
          }
        };

        // 3. User cancels
        session.oncancel = function () {
          postToIOS({ status: "error", error: "User cancelled." });
        };

        session.begin();
      } catch (error) {
        postToIOS({ status: "error", error: "Apple Pay failed to start." });
      }
    }

    if (amountInCents && window.ApplePaySession && ApplePaySession.supportsVersion(3) && ApplePaySession.canMakePayments()) {
      applePayButton.style.display = "inline-block";
      applePayButton.addEventListener("click", startApplePay);
    }
  </script>
</body>
</html>
