<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Apple Pay Checkout</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ffffff;
        }
        .instruction {
            font-size: 18px;
            font-weight: 500;
            color: #333333;
            margin-bottom: 30px;
        }
        /* We must hide the standard credit card fields because we only want the Apple Pay button */
        .hidden-fields { display: none; }
    </style>
    
    <script src="https://test-api.payrix.com/payFieldsScript"></script>
</head>
<body>
    <div class="instruction">Tap below to complete payment</div>
    
    <div class="hidden-fields">
        <div id="number" class="form-row"></div>
        <div id="expiration" class="form-row"></div>
        <div id="cvv" class="form-row"></div>
    </div>

    <script>
        // 1. Get parameters passed from Swift URL
        const urlParams = new URLSearchParams(window.location.search);
        const sessionKey = urlParams.get('session');
        const amountInCents = urlParams.get('amount');

        // 2. Configure PayFields
        if (sessionKey && amountInCents) {
            PayFields.config.txnSessionKey = sessionKey;
            PayFields.config.merchant = "p1_mer_65f480fcb8309191c7819c8"; // Must match your Apple Merchant ID
            PayFields.config.amount = amountInCents;
            
            // Critical for Apple Pay
            PayFields.config.applePay = true; 
            PayFields.config.mode = 'txnToken';

            // 3. Handle Success
            PayFields.onSuccess = function(response) {
                if (window.webkit && window.webkit.messageHandlers.applePayHandler) {
                    window.webkit.messageHandlers.applePayHandler.postMessage({
                        status: 'success', 
                        data: response
                    });
                }
            };

            // 4. Handle Failure/Validation Errors
            PayFields.onFailure = function() {
                if (window.webkit && window.webkit.messageHandlers.applePayHandler) {
                    window.webkit.messageHandlers.applePayHandler.postMessage({
                        status: 'error', 
                        error: 'Payment failed or was cancelled.'
                    });
                }
            };
        } else {
            document.querySelector('.instruction').innerText = "Session configuration missing.";
        }
    </script>
</body>
</html>
