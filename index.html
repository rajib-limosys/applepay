<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pure Apple Pay UI Test</title>
    
    <style>
        body {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; margin: 0; font-family: -apple-system, sans-serif;
            background-color: #ffffff;
        }
        
        #status-text {
            font-size: 16px; color: #333; margin-bottom: 30px; text-align: center; padding: 0 20px;
        }
        
        apple-pay-button {
            --webkit-appearance: -apple-pay-button;
            --apple-pay-button-width: 250px;
            --apple-pay-button-height: 45px;
            --apple-pay-button-border-radius: 6px;
            display: none; /* Hidden by default, revealed by JS if allowed */
        }
    </style>
    
    <script crossorigin src="https://applepay.cdn-apple.com/jsapi/1.latest/apple-pay-sdk.js"></script>
</head>
<body>
    <div id="status-text">Checking Apple Pay Support...</div>
    
    <apple-pay-button id="apple-pay-btn" buttonstyle="black" type="plain" locale="en"></apple-pay-button>

    <script>
        const statusEl = document.getElementById('status-text');
        const applePayBtn = document.getElementById('apple-pay-btn');
        const APPLE_MERCHANT_ID = 'merchant.com.limosys.production'; // Must exactly match your Apple portal

        // 1. Check if ApplePaySession exists in this browser/WebView
        if (window.ApplePaySession) {
            
            // 2. Check if the device can make payments with this specific Merchant ID
            const promise = ApplePaySession.canMakePaymentsWithActiveCard(APPLE_MERCHANT_ID);
            
            promise.then(function (canMakePayments) {
                if (canMakePayments) {
                    statusEl.innerText = "✅ Apple Pay is Ready! Tap below.";
                    applePayBtn.style.display = "inline-block";
                } else {
                    statusEl.innerText = "⚠️ Apple Pay supported, but no active card found OR Domain Verification failed.";
                    // We will force it to show anyway just to see if the UI renders
                    applePayBtn.style.display = "inline-block"; 
                }
            }).catch(function(error) {
                statusEl.innerText = "❌ Error checking Apple Pay: " + error;
            });
            
        } else {
            statusEl.innerText = "❌ ApplePaySession is blocked or unavailable in this WKWebView.";
        }

        // 3. Handle the Button Click
        applePayBtn.addEventListener('click', function() {
            
            statusEl.innerText = "Button Tapped! Opening sheet...";
            
            const paymentRequest = {
                countryCode: 'US',
                currencyCode: 'USD',
                supportedNetworks: ['visa', 'masterCard', 'amex', 'discover'],
                merchantCapabilities: ['supports3DS'],
                total: { label: 'Limosys Test', amount: '10.00' }
            };

            try {
                const session = new ApplePaySession(3, paymentRequest);

                // When the sheet pops up, Apple asks your server to validate the merchant
                session.onvalidatemerchant = function(event) {
                    statusEl.innerText = "Apple Pay Sheet is open! (Validation URL: " + event.validationURL + ")";
                    
                    // We will just abort it here because we don't have a real backend validation setup for this test
                    session.abort();
                    
                    if (window.webkit && window.webkit.messageHandlers.applePayHandler) {
                        window.webkit.messageHandlers.applePayHandler.postMessage({
                            status: 'error',
                            error: 'UI Test Complete. The Apple Pay sheet successfully rendered.'
                        });
                    }
                };

                session.begin();
                
            } catch (e) {
                statusEl.innerText = "❌ Crash on session.begin(): " + e.message;
            }
        });
    </script>
</body>
