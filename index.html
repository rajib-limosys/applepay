<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Apple Pay Checkout</title>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ffffff;
        }
        .instruction {
            font-size: 18px;
            font-weight: 500;
            color: #333333;
            margin-bottom: 30px;
        }
        
        /* This exact CSS is required by Apple WebKit to render the Shadow DOM button */
        apple-pay-button {
            --webkit-appearance: -apple-pay-button;
            --apple-pay-button-width: 250px;
            --apple-pay-button-height: 45px;
            --apple-pay-button-border-radius: 6px;
            --apple-pay-button-padding: 0px 0px;
            --apple-pay-button-box-sizing: border-box;
            display: inline-block;
        }
        
        /* Hide the standard credit card inputs */
        .hidden-fields { display: none; }
    </style>
    
    <script crossorigin src="https://applepay.cdn-apple.com/jsapi/1.latest/apple-pay-sdk.js"></script>
    <script src="https://api.payrix.com/payFieldsScript"></script>
</head>
<body>
    <div class="instruction">Tap below to complete payment</div>
    
    <apple-pay-button buttonstyle="black" type="plain" locale="en"></apple-pay-button>
    
    <div class="hidden-fields">
        <div id="number" class="form-row"></div>
        <div id="expiration" class="form-row"></div>
        <div id="cvv" class="form-row"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const sessionKey = urlParams.get('session');
        const amountInCents = urlParams.get('amount');

        if (sessionKey && amountInCents) {
            
            // Configure PayFields
            PayFields.config.txnSessionKey = sessionKey;
            PayFields.config.merchant = "p1_mer_65f480fcb8309191c7819c8"; 
            PayFields.config.amount = amountInCents;
            PayFields.config.mode = 'txnToken';

            // Payrix Digital Wallet Config
            PayFields.config.applePay = true; 

            // Handle Success
            PayFields.onSuccess = function(response) {
                if (window.webkit && window.webkit.messageHandlers.applePayHandler) {
                    window.webkit.messageHandlers.applePayHandler.postMessage({
                        status: 'success', 
                        data: response
                    });
                }
            };

            // Handle Failure
            PayFields.onFailure = function(errors) {
                if (window.webkit && window.webkit.messageHandlers.applePayHandler) {
                    window.webkit.messageHandlers.applePayHandler.postMessage({
                        status: 'error', 
                        error: 'Payment failed or was cancelled.',
                        details: errors
                    });
                }
            };
        } else {
            document.querySelector('.instruction').innerText = "Session configuration missing.";
        }
    </script>
</body>
</html>
