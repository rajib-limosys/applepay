<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apple Pay Diagnostic</title>
    
    <style>
        body {
            font-family: -apple-system, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; margin: 0; padding: 20px; box-sizing: border-box;
        }
        .instruction { font-size: 18px; font-weight: bold; margin-bottom: 20px; }
        
        apple-pay-button {
            --webkit-appearance: -apple-pay-button;
            --apple-pay-button-width: 250px;
            --apple-pay-button-height: 45px;
            --apple-pay-button-border-radius: 6px;
            display: inline-block;
        }
        
        .hidden-fields { display: none; }
        
        /* Debug Console Styles */
        #debug-console {
            margin-top: 30px; padding: 10px; background: #f0f0f0; border: 1px solid #ccc;
            width: 100%; max-width: 300px; font-size: 12px; color: #d32f2f;
            font-family: monospace; word-wrap: break-word; text-align: left;
        }
    </style>
    
    <script src="https://api.payrix.com/payFieldsScript"></script>
</head>
<body>
    <div class="instruction">Tap below to complete payment</div>
    
    <script crossorigin src="https://applepay.cdn-apple.com/jsapi/1.latest/apple-pay-sdk.js"></script>
    <apple-pay-button buttonstyle="black" type="plain" locale="en"></apple-pay-button>
    
    <div class="hidden-fields">
        <div id="number"></div><div id="expiration"></div><div id="cvv"></div>
        <button type="button" id="submit" name="Submit"></button>
    </div>

    <div id="debug-console"><strong>SYSTEM DIAGNOSTIC:</strong><br></div>

    <script>
        function logDebug(msg) {
            document.getElementById('debug-console').innerHTML += msg + "<br>";
        }

        // 1. Check if Apple Pay even exists in this environment
        if (window.ApplePaySession) {
            logDebug("✅ ApplePaySession Exists");
            var canMake = window.ApplePaySession.canMakePayments();
            logDebug("✅ canMakePayments: " + canMake);
        } else {
            logDebug("❌ ERROR: ApplePaySession is completely missing. WebKit is blocking it.");
        }

        const urlParams = new URLSearchParams(window.location.search);
        const sessionKey = urlParams.get('session');
        const amountInCents = urlParams.get('amount');

        if (sessionKey && amountInCents) {
            logDebug("✅ Session Key & Amount Received");
            
            PayFields.config.txnSessionKey = sessionKey;
            PayFields.config.merchant = "p1_mer_65f480fcb8309191c7819c8"; 
            PayFields.config.amount = amountInCents;
            PayFields.config.mode = 'txnToken';
            PayFields.config.applePay = { enabled: true };

            PayFields.fields = [
                { type: 'number', element: '#number' },
                { type: 'cvv', element: '#cvv' },
                { type: 'expiration', element: '#expiration' }
            ];
            PayFields.button = { element: "#submit" };

            PayFields.onSuccess = function(response) {
                logDebug("✅ Payrix Success Callback Hit");
                if (window.webkit && window.webkit.messageHandlers.applePayHandler) {
                    window.webkit.messageHandlers.applePayHandler.postMessage({ status: 'success', data: response });
                }
            };

            PayFields.onFailure = function(errors) {
                logDebug("❌ Payrix Failed: " + JSON.stringify(errors));
                if (window.webkit && window.webkit.messageHandlers.applePayHandler) {
                    window.webkit.messageHandlers.applePayHandler.postMessage({ status: 'error', error: 'Payment failed.', details: errors });
                }
            };
        } else {
            logDebug("❌ ERROR: Missing URL Parameters");
        }
    </script>
</body>
</html>
